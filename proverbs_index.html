<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常用谚语150句</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f5f4f0; /* 典雅浅莫兰迪纸张色 */
            color: #4a443f; 
            -webkit-tap-highlight-color: transparent;
        }
        .proverb-title { 
            font-family: 'Noto Serif SC', serif; 
        }
        
        ruby {
            ruby-position: over;
            ruby-align: center;
        }
        rt {
            font-family: 'Inter', sans-serif;
            font-size: 0.40em;
            color: #8c8175;
            letter-spacing: 0.08em;
            padding-bottom: 0.3em;
            user-select: none;
        }
        
        /* 标点不带注音并居底对齐样式 */
        .punctuation {
            display: inline-block;
            vertical-align: bottom;
            margin: 0 4px;
            font-family: sans-serif;
            font-weight: bold;
            color: #4a443f;
        }

        #card-container { 
            perspective: 1500px; 
        }
        .transform-style-3d { 
            transform-style: preserve-3d; 
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .backface-hidden { 
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        
        #flip-card > div:nth-child(2) {
            transform: rotateY(180deg);
        }
        
        button:disabled {
            cursor: not-allowed;
            opacity: 0.85;
        }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-start select-none">

    <div id="app" class="w-full max-w-lg pt-4 flex flex-col">
        <header class="text-center mb-4">
            <h1 class="text-2xl font-bold text-stone-700 tracking-wide proverb-title">常用谚语150句</h1>
            <div class="mt-3 bg-stone-200/60 rounded-full h-2 w-full overflow-hidden flex">
                <div id="mastery-progress-bar" class="bg-amber-600 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="mastery-status" class="text-[10px] text-stone-400 mt-1.5 font-mono tracking-wider">已掌握 0 / 150 句 (0%)</p>
        </header>

        <div class="mb-4">
            <p class="text-[10px] text-stone-400 font-bold uppercase tracking-wider mb-2 text-center">拼音首字母快速检索</p>
            <div id="filterNav" class="flex gap-1.5 flex-wrap justify-center bg-stone-200/40 p-2.5 rounded-2xl border border-stone-200/50">
                <!-- 由 JS 根据数据源自动生成字母按钮 -->
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <button onclick="startWeaknessTraining()" class="bg-white border border-stone-200 py-3 px-2 rounded-xl shadow-sm text-center text-stone-700 text-xs font-semibold hover:bg-stone-50 transition-all flex items-center justify-center gap-1.5">
                🎯 错题训练 (<span id="wrong-count-badge" class="text-amber-600 font-bold">0</span>)
            </button>
            <button onclick="startQuiz()" class="bg-gradient-to-r from-amber-600 to-amber-700 text-white py-3 px-2 rounded-xl shadow-md text-xs font-semibold hover:from-amber-700 transition-all flex items-center justify-center gap-1.5">
                📝 谚语小测验
            </button>
        </div>

        <div id="card-container" class="w-full h-[380px] sm:h-[400px] cursor-pointer mb-4 relative">
            <div id="flip-card" class="w-full h-full relative transform-style-3d">
                
                <!-- 卡片正面：带拼音字号自适应的谚语 -->
                <div class="absolute inset-0 bg-white rounded-2xl border border-stone-200 shadow-xl shadow-stone-200/30 flex flex-col items-center justify-center p-6 backface-hidden">
                    <div id="card-proverb-ruby" class="proverb-title flex flex-wrap items-center justify-center leading-loose tracking-wide select-none">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 卡片反面：三语解释与例句 -->
                <div class="absolute inset-0 bg-amber-50/30 rounded-2xl border-2 border-amber-100/60 shadow-xl shadow-stone-200/30 flex flex-col p-5 backface-hidden overflow-hidden">
                    <div class="absolute inset-2 border border-amber-900/5 rounded-xl pointer-events-none"></div>

                    <div class="relative z-10 flex flex-col justify-between h-full py-0.5">
                        <!-- 华语释义 -->
                        <div>
                            <div class="inline-flex items-center gap-1 bg-amber-800/10 text-amber-800 text-[10px] font-bold tracking-wider px-2 py-0.5 rounded-md mb-1.5">
                                <span>华文解释</span>
                            </div>
                            <p id="card-def-zh" class="text-[14px] font-semibold text-stone-800 leading-relaxed pl-1"></p>
                        </div>

                        <!-- 英文与马来文翻译双栏 -->
                        <div class="grid grid-cols-2 gap-3 border-t border-b border-amber-900/5 py-2.5 my-1">
                            <div>
                                <div class="inline-flex items-center gap-1 bg-sky-100/60 text-sky-800 text-[9px] font-bold tracking-wider px-1.5 py-0.5 rounded mb-1">
                                    <span>ENGLISH</span>
                                </div>
                                <p id="card-def-en" class="text-[11px] italic text-sky-900/70 leading-snug pl-0.5"></p>
                            </div>
                            <div>
                                <div class="inline-flex items-center gap-1 bg-rose-100/60 text-rose-800 text-[9px] font-bold tracking-wider px-1.5 py-0.5 rounded mb-1">
                                    <span>BAHASA MELAYU</span>
                                </div>
                                <p id="card-def-bm" class="text-[11px] text-rose-900/70 leading-snug pl-0.5 font-medium"></p>
                            </div>
                        </div>

                        <!-- 用例/释义补充 -->
                        <div class="bg-white/80 border border-amber-950/5 p-3 rounded-xl shadow-sm">
                            <div class="inline-flex items-center gap-1 bg-amber-900/5 text-amber-900/70 text-[10px] font-bold tracking-wider px-1.5 py-0.5 rounded mb-1.5">
                                <span>学习备考指引</span>
                            </div>
                            <p id="card-example" class="text-stone-600 text-[11px] leading-relaxed pl-0.5"></p>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="w-full flex flex-col items-center gap-3">
            <div class="grid grid-cols-2 gap-4 w-full">
                <button onclick="markMastery(false)" class="bg-white border-2 border-stone-200 hover:border-red-400 hover:bg-red-50/30 text-stone-700 py-3 px-6 rounded-xl font-semibold shadow-sm transition-all text-center text-sm flex items-center justify-center gap-2">
                    ❌ 待加强
                </button>
                <button onclick="markMastery(true)" class="bg-stone-800 hover:bg-stone-900 text-white py-3 px-6 rounded-xl font-semibold shadow-md transition-all text-center text-sm flex items-center justify-center gap-2">
                    ✅ 已掌握
                </button>
            </div>
            <p id="progress-indicator" class="text-[11px] text-stone-400 font-mono tracking-wider"></p>
        </div>
    </div>

    <!-- 提示框与弹窗 -->
    <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <!-- 小测验弹窗 -->
    <div id="quiz-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center hidden z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-5 relative flex flex-col max-h-[90vh]">
            <button onclick="closeQuiz()" class="absolute top-3 right-3 text-stone-400 hover:text-stone-600 text-xl font-bold transition-colors">&times;</button>
            
            <div class="border-b border-stone-100 pb-2 mb-3">
                <h3 class="text-base font-bold text-stone-800 flex items-center gap-1" id="quiz-title-text">🎯 常用谚语智力测试</h3>
                <div class="w-full bg-stone-100 h-1.5 rounded-full mt-2 overflow-hidden">
                    <div id="quiz-progress-bar" class="bg-amber-600 h-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <p id="quiz-q-num" class="text-[10px] text-stone-400 mt-1 font-mono"></p>
            </div>

            <div class="flex-1 overflow-y-auto mb-1 pr-1">
                <div id="quiz-question-container">
                    <h4 id="quiz-question-word" class="text-xl font-serif font-bold text-stone-800 text-center my-3 leading-relaxed">-</h4>
                    <div id="quiz-options" class="space-y-2"></div>
                </div>
                
                <div id="quiz-result-container" class="hidden text-center py-6">
                    <span class="text-4xl block animate-bounce">🏆</span>
                    <h4 class="text-xl font-bold text-stone-800 mt-3">测验圆满结束！</h4>
                    <p id="quiz-score" class="text-3xl font-black text-amber-600 my-3">0 / 10</p>
                    <p id="quiz-eval" class="text-xs text-stone-500 mb-5 px-4"></p>
                    <button onclick="startQuiz()" class="w-full py-2.5 bg-stone-800 text-white rounded-xl text-sm font-medium hover:bg-stone-900 transition-colors">
                        再考一次
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="data-proverb-1.js"></script>
    <script src="data-proverb-2.js"></script>
    <script src="data-proverb-3.js"></script>
    <script src="data-proverb-4.js"></script>
    <script src="data-proverb-5.js"></script>
    <script src="data-proverb-6.js"></script>

    <script>
        const allProverbs = [
            ...(typeof proverbData1 !== 'undefined' ? proverbData1 : []),
            ...(typeof proverbData2 !== 'undefined' ? proverbData2 : []),
            ...(typeof proverbData3 !== 'undefined' ? proverbData3 : []),
            ...(typeof proverbData4 !== 'undefined' ? proverbData4 : []),
            ...(typeof proverbData5 !== 'undefined' ? proverbData5 : []),
            ...(typeof proverbData6 !== 'undefined' ? proverbData6 : [])
        ];

        let currentPlan = [];
        let currentIndex = 0;
        let isFlipped = false;
        let isWeaknessMode = false;
        let activeLetter = '全部';

        let quizQuestions = [];
        let quizCurrentIndex = 0;
        let quizScore = 0;
        const QUIZ_TOTAL = 10;

        function generateRubyMarkup(proverb, pinyinStr) {
            const chars = proverb.split('');
            const pinyins = pinyinStr.split(' ');
            let html = '';
            let pinyinIdx = 0;
            
            const punctuations = ['，', '。', '；', '：', '？', '！', '、', '“', '”', '‘', '’'];

            for (let i = 0; i < chars.length; i++) {
                const char = chars[i];
                if (punctuations.includes(char)) {
                    html += `<span class="punctuation text-stone-700 mx-1">${char}</span>`;
                } else {
                    const py = pinyins[pinyinIdx] || '';
                    html += `<ruby class="mx-0.5">${char}<rt>${py}</rt></ruby>`;
                    pinyinIdx++;
                }
            }
            return html;
        }

        function adjustFontSize(length) {
            const rubyContainer = document.getElementById('card-proverb-ruby');
            if (!rubyContainer) return;
            if (length > 14) {
                rubyContainer.className = "proverb-title flex flex-wrap items-center justify-center text-xl sm:text-2xl leading-relaxed select-none";
            } else if (length > 10) {
                rubyContainer.className = "proverb-title flex flex-wrap items-center justify-center text-2xl sm:text-3xl leading-relaxed select-none";
            } else {
                rubyContainer.className = "proverb-title flex flex-wrap items-center justify-center text-4xl sm:text-5xl leading-loose select-none";
            }
        }

        function renderAlphabetFilters() {
            const letters = new Set();
            allProverbs.forEach(item => {
                if (item.pinyin && item.pinyin.trim().length > 0) {
                    const firstLetter = item.pinyin.trim()[0].toUpperCase();
                    if (/[A-Z]/.test(firstLetter)) {
                        letters.add(firstLetter);
                    }
                }
            });

            const sortedLetters = Array.from(letters).sort();
            const nav = document.getElementById('filterNav');
            if (!nav) return;

            let html = `<button class="px-3 py-1 text-xs rounded-full font-semibold transition-all active ${activeLetter === '全部' ? 'bg-amber-600 text-white' : 'bg-white text-stone-600 border border-stone-200'}" onclick="filterLetter('全部')">全部</button>`;
            
            sortedLetters.forEach(let => {
                const isActive = activeLetter === let;
                html += `<button class="px-2.5 py-1 text-xs rounded-full font-semibold transition-all ${isActive ? 'bg-amber-600 text-white' : 'bg-white text-stone-600 border border-stone-200'}" onclick="filterLetter('${let}')">${let}</button>`;
            });

            nav.innerHTML = html;
        }

        function initApp() {
            renderAlphabetFilters();
            filterData();
            setupFlipEvent();
            renderCard();
            updateMasteryProgress();
        }

        function filterData() {
            if (activeLetter === '全部') {
                currentPlan = [...allProverbs];
            } else {
                currentPlan = allProverbs.filter(item => {
                    const first = item.pinyin.trim()[0].toUpperCase();
                    return first === activeLetter;
                });
            }
            currentIndex = 0;
        }

        function renderCard() {
            if (currentPlan.length === 0) {
                showEmptyState();
                return;
            }
            if (currentIndex >= currentPlan.length) { currentIndex = 0; }

            const currentItem = currentPlan[currentIndex];
            const flipCardEl = document.getElementById('flip-card');
            if (flipCardEl) flipCardEl.classList.remove('rotate-y-180');
            isFlipped = false;

            adjustFontSize(currentItem.proverb.length);

            const rubyContainer = document.getElementById('card-proverb-ruby');
            if (rubyContainer) {
                rubyContainer.innerHTML = generateRubyMarkup(currentItem.proverb, currentItem.pinyin);
            }

            document.getElementById('card-def-zh').innerText = currentItem.defZh || '暂无释义';
            document.getElementById('card-def-en').innerText = currentItem.defEn || 'No translation available.';
            document.getElementById('card-def-bm').innerText = currentItem.defBm || 'Tiada terjemahan.';
            document.getElementById('card-example').innerText = currentItem.example || '本句多在华文议论文写作中用作论据，引导学生树立优良价值观。';

            const progressEl = document.getElementById('progress-indicator');
            if (progressEl) {
                progressEl.innerText = `进度：${currentIndex + 1} / ${currentPlan.length} ${isWeaknessMode ? '（错题本复习）' : ''}`;
            }
        }

        function setupFlipEvent() {
            const container = document.getElementById('card-container');
            const flipCardEl = document.getElementById('flip-card');
            if (container && flipCardEl) {
                container.onclick = null;
                container.onclick = function() {
                    isFlipped = !isFlipped;
                    flipCardEl.classList.toggle('rotate-y-180', isFlipped);
                };
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgClass = type === 'success' ? 'bg-amber-800 text-white' : 'bg-red-50 border border-red-200 text-red-800';
            toast.className = `${bgClass} px-4 py-2.5 rounded-xl shadow-lg text-xs font-semibold tracking-wide flex items-center gap-1.5 animate-bounce pointer-events-auto transition-all duration-300`;
            toast.innerHTML = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-2');
                setTimeout(() => { toast.remove(); }, 300);
            }, 2300);
        }

        function updateMasteryProgress() {
            let wrongList = JSON.parse(localStorage.getItem('proverbs_wrong_list')) || [];
            const total = allProverbs.length;
            const wrongCount = wrongList.length;
            const masteredCount = Math.max(0, total - wrongCount);
            
            const percent = total > 0 ? Math.round((masteredCount / total) * 100) : 0;
            
            const bar = document.getElementById('mastery-progress-bar');
            if (bar) bar.style.width = `${percent}%`;
            
            const txt = document.getElementById('mastery-status');
            if (txt) txt.innerText = `已掌握 ${masteredCount} / ${total} 句 (${percent}%)`;

            const badge = document.getElementById('wrong-count-badge');
            if (badge) badge.innerText = wrongCount;
        }

        function markMastery(isMastered) {
            if (currentPlan.length === 0) return;
            const currentItem = currentPlan[currentIndex];
            let wrongList = JSON.parse(localStorage.getItem('proverbs_wrong_list')) || [];
            const text = currentItem.proverb || '';

            if (!isMastered) {
                if (!wrongList.some(item => item.proverb === text)) { wrongList.push(currentItem); }
                showToast("📌 已加入错题集重点强化");
            } else {
                wrongList = wrongList.filter(item => item.proverb !== text);
                showToast("🎉 完美掌握，太棒了！");
            }

            localStorage.setItem('proverbs_wrong_list', JSON.stringify(wrongList));
            updateMasteryProgress();
            currentIndex++;
            
            if (currentIndex >= currentPlan.length) {
                if (isWeaknessMode) {
                    showToast("👑 恭喜！本轮错题集训完美通过！");
                    isWeaknessMode = false;
                    filterLetter('全部');
                    return;
                } else {
                    showToast("🌟 本类别下的谚语全部阅读完毕！");
                    currentIndex = 0; 
                }
            }
            renderCard();
        }

        function startWeaknessTraining() {
            const wrongList = JSON.parse(localStorage.getItem('proverbs_wrong_list')) || [];
            if (wrongList.length === 0) {
                showToast("✨ 恭喜，目前没有任何错题记录哦！");
                return;
            }
            isWeaknessMode = true;
            currentPlan = [...wrongList].sort(() => 0.5 - Math.random()); 
            currentIndex = 0;
            renderCard();
        }

        function filterLetter(letter) {
            isWeaknessMode = false;
            activeLetter = letter;
            renderAlphabetFilters();
            filterData();
            renderCard();
        }

        function showEmptyState() {
            const rubyContainer = document.getElementById('card-proverb-ruby');
            if (rubyContainer) rubyContainer.innerHTML = `<span class="text-base text-stone-400">暂无对应谚语</span>`;
        }

        function startQuiz() {
            const quizSource = currentPlan;
            if (!quizSource || quizSource.length === 0) {
                showToast("⚠️ 当前分类下暂无数据，无法启动小测验", "error");
                return;
            }

            document.getElementById('quiz-question-container').classList.remove('hidden');
            document.getElementById('quiz-result-container').classList.add('hidden');
            document.getElementById('quiz-title-text').innerText = `🎯 谚语首字母 [${activeLetter}] 挑战`;

            const shuffled = [...quizSource].sort(() => 0.5 - Math.random());
            const actualTotal = Math.min(QUIZ_TOTAL, quizSource.length);
            quizQuestions = shuffled.slice(0, actualTotal).map(q => {
                return { ...q, qType: Math.floor(Math.random() * 3) };
            });

            quizCurrentIndex = 0;
            quizScore = 0;

            document.getElementById('quiz-modal').classList.remove('hidden');
            renderQuizQuestion();
        }

        function closeQuiz() {
            document.getElementById('quiz-modal').classList.add('hidden');
        }

        function renderQuizQuestion() {
            const currentQ = quizQuestions[quizCurrentIndex];
            
            document.getElementById('quiz-q-num').innerText = `题目 ${quizCurrentIndex + 1} / ${quizQuestions.length}`;
            const percent = ((quizCurrentIndex) / quizQuestions.length) * 100;
            document.getElementById('quiz-progress-bar').style.width = `${percent}%`;

            const questionWordEl = document.getElementById('quiz-question-word');

            const distractors = allProverbs
                .filter(item => item.proverb !== currentQ.proverb)
                .sort(() => 0.5 - Math.random())
                .slice(0, 3);

            const options = [currentQ, ...distractors].sort(() => 0.5 - Math.random());
            const optionsContainer = document.getElementById('quiz-options');

            if (currentQ.qType === 0) {
                // 【看句猜意】
                questionWordEl.innerHTML = `<span class="text-[10px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded font-sans font-medium block w-max mx-auto mb-2">看谚语猜中文释义</span>${currentQ.proverb}`;
                optionsContainer.innerHTML = options.map(opt => {
                    const isCorrect = (opt.proverb === currentQ.proverb);
                    return `<button onclick="handleQuizAnswer(this, ${isCorrect})" class="w-full text-left p-3.5 rounded-xl border border-stone-200 hover:border-amber-500 hover:bg-amber-50/40 transition-all font-sans text-stone-700 text-xs leading-relaxed">${opt.defZh}</button>`;
                }).join('');
            } else if (currentQ.qType === 1) {
                // 【根据释义选句】
                questionWordEl.innerHTML = `<span class="text-[10px] bg-sky-100 text-sky-800 px-2 py-0.5 rounded font-sans font-medium block w-max mx-auto mb-2">根据释义选择合适谚语</span><p class="text-sm font-sans px-4 text-stone-700 leading-relaxed text-left font-semibold">${currentQ.defZh}</p>`;
                optionsContainer.innerHTML = options.map(opt => {
                    const isCorrect = (opt.proverb === currentQ.proverb);
                    return `<button onclick="handleQuizAnswer(this, ${isCorrect})" class="w-full text-center p-3 rounded-xl border border-stone-200 hover:border-amber-500 hover:bg-amber-50/40 transition-all font-serif font-bold text-stone-800 text-xs">${opt.proverb}</button>`;
                }).join('');
            } else {
                // 【马来语翻译对照】
                questionWordEl.innerHTML = `<span class="text-[10px] bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded font-sans font-medium block w-max mx-auto mb-2">选择对应马来语/Peribahasa</span><p class="text-sm font-sans px-4 text-stone-700 leading-relaxed text-left font-semibold">${currentQ.proverb}</p>`;
                optionsContainer.innerHTML = options.map(opt => {
                    const isCorrect = (opt.proverb === currentQ.proverb);
                    return `<button onclick="handleQuizAnswer(this, ${isCorrect})" class="w-full text-left p-3 rounded-xl border border-stone-200 hover:border-amber-500 hover:bg-amber-50/40 transition-all font-sans text-stone-700 text-xs">${opt.defBm}</button>`;
                }).join('');
            }
        }

        function handleQuizAnswer(buttonEl, isCorrect) {
            const allButtons = document.getElementById('quiz-options').querySelectorAll('button');
            allButtons.forEach(btn => btn.disabled = true);

            if (isCorrect) {
                quizScore++;
                buttonEl.classList.remove('border-stone-200', 'hover:border-amber-500');
                buttonEl.classList.add('border-green-500', 'bg-green-50/60', 'text-green-800');
            } else {
                buttonEl.classList.remove('border-stone-200', 'hover:border-amber-500');
                buttonEl.classList.add('border-red-500', 'bg-red-50/60', 'text-red-800');
                
                allButtons.forEach(btn => {
                    if (btn.getAttribute('onclick').includes('true')) {
                        btn.classList.add('border-green-500', 'bg-green-50/40');
                    }
                });

                let wrongList = JSON.parse(localStorage.getItem('proverbs_wrong_list')) || [];
                const currentQ = quizQuestions[quizCurrentIndex];
                if (!wrongList.some(item => item.proverb === currentQ.proverb)) {
                    wrongList.push(currentQ);
                    localStorage.setItem('proverbs_wrong_list', JSON.stringify(wrongList));
                    updateMasteryProgress();
                }
            }

            setTimeout(() => {
                quizCurrentIndex++;
                if (quizCurrentIndex < quizQuestions.length) {
                    renderQuizQuestion();
                } else {
                    showQuizResults();
                }
            }, 1200);
        }

        function showQuizResults() {
            document.getElementById('quiz-progress-bar').style.width = `100%`;
            document.getElementById('quiz-question-container').classList.add('hidden');
            document.getElementById('quiz-result-container').classList.remove('hidden');

            document.getElementById('quiz-score').innerText = `${quizScore} / ${quizQuestions.length}`;
            let evalTxt = "多刷刷卡片，相信你下次能拿满分！";
            if (quizScore === quizQuestions.length) {
                evalTxt = "🥇 登峰造极！满分通过测试！";
            } else if (quizScore >= Math.floor(quizQuestions.length * 0.8)) {
                evalTxt = "✨ 卓越！基础非常扎实！";
            }
            document.getElementById('quiz-eval').innerText = evalTxt;
        }

        window.onload = initApp;
    </script>
</body>
</html>
