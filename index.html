<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常用谚语218句</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for premium Chinese Serif & English Inter layout -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f6f5f2; /* 护眼莫兰迪柔灰色 */
            color: #4a4540; 
            -webkit-tap-highlight-color: transparent; /* 清除移动端点击高亮 */
        }
        .yanyu-title { 
            font-family: 'Noto Serif SC', serif; 
        }
        
        /* 拼音标注样式：拼音完美居中对齐在汉字正上方 */
        ruby {
            ruby-position: over;
            ruby-align: center;
        }
        rt {
            font-family: 'Inter', sans-serif;
            font-size: 0.42em; /* 精确控制拼音大小 */
            color: #8c8275;   /* 柔和灰色拼音 */
            letter-spacing: 0.1em;
            padding-bottom: 0.35em;
            user-select: none;
        }

        /* 3D 卡片翻转核心动画样式 */
        #card-container { 
            perspective: 1200px; 
        }
        .transform-style-3d { 
            transform-style: preserve-3d; 
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .backface-hidden { 
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        .rotate-y-180 { 
            transform: rotateY(180deg); 
        }
        
        /* 负负得正：当整个卡片座旋转 180 度时，背面自动正过来，防止镜像倒转 */
        #flip-card > div:nth-child(2) {
            transform: rotateY(180deg);
        }
        
        /* 选项被禁用时的样式 */
        button:disabled {
            cursor: not-allowed;
            opacity: 0.85;
        }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center justify-start select-none">

    <div id="app" class="w-full max-w-lg pt-4 flex flex-col">
        <header class="text-center mb-4">
            <h1 class="text-2xl font-bold text-stone-700 tracking-wide yanyu-title">常用谚语150句</h1>
            <!-- 掌握度进度条（Gamification 仪表盘） -->
            <div class="mt-3 bg-stone-200/60 rounded-full h-2 w-full overflow-hidden flex">
                <div id="mastery-progress-bar" class="bg-emerald-500 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="mastery-status" class="text-[10px] text-stone-400 mt-1.5 font-mono tracking-wider">已掌握 0 / 150 词 (0%)</p>
        </header>

        <!-- A-Z 拼音首字母智能过滤导航栏 -->
        <nav class="flex gap-1.5 flex-wrap justify-center mb-4" id="filterNav">
            <!-- 字母表按钮将由 JavaScript 动态生成以自动检测具有有效数据的字母 -->
        </nav>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <!-- 错题专项训练 -->
            <button onclick="startWeaknessTraining()" class="bg-white border border-stone-200 py-3 px-2 rounded-xl shadow-sm text-center text-stone-700 text-xs font-semibold hover:bg-stone-50 transition-all flex items-center justify-center gap-1.5">
                🎯 错题训练 (0)
            </button>
            
            <!-- Quiz 小测验 -->
            <button onclick="startQuiz()" class="bg-gradient-to-r from-amber-500 to-orange-500 text-white py-3 px-2 rounded-xl shadow-md text-xs font-semibold hover:from-amber-600 hover:to-orange-600 transition-all flex items-center justify-center gap-1.5">
                📝 开始小测验
            </button>
        </div>

        <div id="card-container" class="w-full h-[390px] sm:h-[410px] cursor-pointer mb-4 relative">
            <div id="flip-card" class="w-full h-full relative transform-style-3d">
                
                <!-- 卡片正面：谚语与大拼音 -->
                <div class="absolute inset-0 bg-white rounded-2xl border border-stone-100 shadow-xl shadow-stone-200/50 flex flex-col items-center justify-center p-6 backface-hidden">
                    <div id="card-yanyu-ruby" class="yanyu-title flex flex-wrap items-center justify-center text-3xl sm:text-4xl text-center leading-relaxed tracking-wide select-none px-4">
                        <!-- 由 JavaScript 动态生成带拼音的汉字与完美下沉标点 -->
                    </div>
                </div>

                <!-- 卡片反面：双栏翻译 + 大字号释义 + 语境例句（挖空） -->
                <div class="absolute inset-0 bg-orange-50/40 rounded-2xl border-2 border-orange-100/60 shadow-xl shadow-stone-200/50 flex flex-col p-5 backface-hidden overflow-hidden">
                    <!-- 内层典雅细线框 -->
                    <div class="absolute inset-2 border border-amber-900/5 rounded-xl pointer-events-none"></div>

                    <div class="relative z-10 flex flex-col justify-between h-full py-0.5">
                        <!-- 中文释义区块 -->
                        <div>
                            <div class="inline-flex items-center gap-1 bg-amber-700/10 text-amber-800 text-[10px] font-bold tracking-wider px-2 py-0.5 rounded-md mb-1.5">
                                <span>华文释义</span>
                            </div>
                            <p id="card-def-zh" class="text-[14px] font-semibold text-stone-800 leading-relaxed pl-1">暂无释义</p>
                        </div>

                        <!-- 翻译双栏区块（左英文，右国文） -->
                        <div class="grid grid-cols-2 gap-3 border-t border-b border-amber-900/5 py-2.5 my-1">
                            <!-- 英文翻译 -->
                            <div>
                                <div class="inline-flex items-center gap-1 bg-sky-100/60 text-sky-800 text-[9px] font-bold tracking-wider px-1.5 py-0.5 rounded mb-1">
                                    <span>ENGLISH</span>
                                </div>
                                <p id="card-def-en" class="text-[11px] italic text-sky-900/70 leading-snug pl-0.5">No translation.</p>
                            </div>
                            <!-- 马来文翻译 -->
                            <div>
                                <div class="inline-flex items-center gap-1 bg-rose-100/60 text-rose-800 text-[9px] font-bold tracking-wider px-1.5 py-0.5 rounded mb-1">
                                    <span>MELAYU / PERIBAHASA</span>
                                </div>
                                <p id="card-def-bm" class="text-[11px] text-rose-900/70 leading-snug pl-0.5 font-medium">Tiada terjemahan.</p>
                            </div>
                        </div>

                        <!-- 例句语境展示区（带智能挖空机制） -->
                        <div id="card-example-box">
                            <!-- 动态加载例句 -->
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="w-full flex flex-col items-center gap-3">
            <div class="grid grid-cols-2 gap-4 w-full">
                <button onclick="markMastery(false)" class="bg-white border-2 border-stone-200 hover:border-red-400 hover:bg-red-50/30 text-stone-700 py-3 px-6 rounded-xl font-semibold shadow-sm transition-all text-center text-sm flex items-center justify-center gap-2">
                    ❌ 待加强
                </button>
                <button onclick="markMastery(true)" class="bg-stone-800 hover:bg-stone-900 text-white py-3 px-6 rounded-xl font-semibold shadow-md transition-all text-center text-sm flex items-center justify-center gap-2">
                    ✅ 已掌握
                </button>
            </div>

            <!-- 进度条文本 -->
            <p id="progress-indicator" class="text-[11px] text-stone-400 font-mono tracking-wider">进度：0 / 0</p>
        </div>
    </div>

    <!-- 弹出的气泡消息通知盒 -->
    <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <!-- 智能测验视窗 -->
    <div id="quiz-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center hidden z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-5 relative flex flex-col max-h-[90vh]">
            <button onclick="closeQuiz()" class="absolute top-3 right-3 text-stone-400 hover:text-stone-600 text-xl font-bold transition-colors">&times;</button>
            
            <div class="border-b border-stone-100 pb-2 mb-3">
                <h3 class="text-base font-bold text-stone-800 flex items-center gap-1" id="quiz-title-text">🎯 谚语多维挑战</h3>
                <div class="w-full bg-stone-100 h-1.5 rounded-full mt-2 overflow-hidden">
                    <div id="quiz-progress-bar" class="bg-amber-500 h-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <p id="quiz-q-num" class="text-[10px] text-stone-400 mt-1 font-mono">题目 1 / 10</p>
            </div>

            <div class="flex-1 overflow-y-auto mb-1 pr-1">
                <div id="quiz-question-container">
                    <h4 id="quiz-question-word" class="text-xl font-serif font-bold text-stone-800 text-center my-3 tracking-wide leading-relaxed px-2">-</h4>
                    <div id="quiz-options" class="space-y-2"></div>
                </div>
                
                <!-- 测验结算报告 -->
                <div id="quiz-result-container" class="hidden text-center py-6">
                    <span class="text-4xl block animate-bounce">🏆</span>
                    <h4 class="text-xl font-bold text-stone-800 mt-3">测验圆满结束！</h4>
                    <p id="quiz-score" class="text-3xl font-black text-amber-600 my-3">0 / 10</p>
                    <p id="quiz-eval" class="text-xs text-stone-500 mb-5 px-4">完成得不错！</p>
                    <button onclick="startQuiz()" class="w-full py-2.5 bg-stone-800 text-white rounded-xl text-sm font-medium hover:bg-stone-900 transition-colors">
                        再考一次
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         🧱 核心数据引入区（严格解耦自6个分卷文件）
         ========================================== -->
    <script src="data-proverb-1.js"></script>
    <script src="data-proverb-2.js"></script>
    <script src="data-proverb-3.js"></script>
    <script src="data-proverb-4.js"></script>
    <script src="data-proverb-5.js"></script>
    <script src="data-proverb-6.js"></script>

    <!-- ==========================================
         🧬 主数据自动打包器与合并中心
         ========================================== -->
    <script>
        let allProverbs = [];
        if(typeof pData1 !== 'undefined') allProverbs = allProverbs.concat(pData1);
        if(typeof pData2 !== 'undefined') allProverbs = allProverbs.concat(pData2);
        if(typeof pData3 !== 'undefined') allProverbs = allProverbs.concat(pData3);
        if(typeof pData4 !== 'undefined') allProverbs = allProverbs.concat(pData4);
        if(typeof pData5 !== 'undefined') allProverbs = allProverbs.concat(pData5);
        if(typeof pData6 !== 'undefined') allProverbs = allProverbs.concat(pData6);
    </script>

    <!-- ==========================================
         🎮 核心业务及交互逻辑控制引擎
         ========================================== -->
    <script>
        let currentPlan = [];       
        let currentIndex = 0;       
        let isFlipped = false;      
        let isWeaknessMode = false;  
        let activeLetter = 'ALL';   

        // 测验数据流
        let quizQuestions = [];     
        let quizCurrentIndex = 0;   
        let quizScore = 0;          
        const QUIZ_TOTAL = 10;      

        // 正面渲染引擎：拼音严格按照空格拆解映射汉字，支持纯符号完美下沉不带悬浮音标
        function generateRubyMarkup(text, pinyinStr) {
            const chars = text.split('');
            const pinyins = pinyinStr ? pinyinStr.split(' ') : [];
            let html = '';
            let pyIndex = 0;
            const puncts = ['，', '。', '；', '：', '？', '！', ',', '.', ' ', '、'];

            for (let i = 0; i < chars.length; i++) {
                const char = chars[i];
                if (puncts.includes(char)) {
                    html += `<span class="mx-0.5 self-end text-2xl sm:text-3xl font-bold text-stone-600">${char}</span>`;
                } else {
                    const py = pinyins[pyIndex] || '';
                    html += `<ruby class="mx-0.5">${char}<rt>${py}</rt></ruby>`;
                    pyIndex++;
                }
            }
            return html;
        }

        // 应用生命周期挂载
        function initApp() {
            try {
                let wrongList = JSON.parse(localStorage.getItem('yanyu_wrong_list')) || [];
                updateWeaknessButton(wrongList.length);

                buildAlphabetNav();
                filterLetterData();
                setupFlipEvent();
                renderCard();
                updateMasteryProgress();
            } catch (error) {
                console.error("初始化错误:", error);
            }
        }

        // 基于全库有效数据动态剪裁 A-Z 标签过滤导航栏
        function buildAlphabetNav() {
            const activeLettersInData = new Set();
            allProverbs.forEach(p => {
                if(p.pinyin_key) activeLettersInData.add(p.pinyin_key.toUpperCase());
            });

            const nav = document.getElementById('filterNav');
            const alphabet = ['A','B','C','D','E','F','G','H','J','K','L','M','N','P','Q','R','S','T','W','X','Y','Z'];
            
            let html = `<button class="px-3 py-1 bg-stone-800 text-white border border-stone-800 text-xs rounded-full transition-all" onclick="filterLetter('ALL')">全部</button>`;
            
            alphabet.forEach(l => {
                if (activeLettersInData.has(l)) {
                    html += `<button class="px-2.5 py-1 bg-white border border-stone-200 hover:border-stone-400 hover:bg-stone-50 text-stone-600 text-xs rounded-full transition-all" onclick="filterLetter('${l}')">${l}</button>`;
                } else {
                    html += `<button class="px-2.5 py-1 bg-stone-100/50 border border-stone-200/40 text-stone-300 text-xs rounded-full transition-all" disabled>${l}</button>`;
                }
            });
            nav.innerHTML = html;
        }

        function filterLetterData() {
            if (activeLetter === 'ALL') {
                currentPlan = [...allProverbs];
            } else {
                currentPlan = allProverbs.filter(item => item.pinyin_key && item.pinyin_key.toUpperCase() === activeLetter);
            }
            currentIndex = 0;
        }

        function renderCard() {
            if (currentPlan.length === 0) {
                showEmptyState();
                return;
            }
            if (currentIndex >= currentPlan.length) { currentIndex = 0; }

            const currentProverb = currentPlan[currentIndex];
            const flipCardEl = document.getElementById('flip-card');
            if (flipCardEl) flipCardEl.classList.remove('rotate-y-180');
            isFlipped = false;

            // 1. 卡片正面三维动态排版
            const rubyContainer = document.getElementById('card-yanyu-ruby');
            if (rubyContainer) {
                rubyContainer.innerHTML = generateRubyMarkup(currentProverb.text, currentProverb.pinyin);
                if(currentProverb.text.length > 12) {
                    rubyContainer.className = "yanyu-title flex flex-wrap items-center justify-center text-xl sm:text-2xl text-center leading-relaxed tracking-wide select-none px-2";
                } else {
                    rubyContainer.className = "yanyu-title flex flex-wrap items-center justify-center text-3xl sm:text-4xl text-center leading-relaxed tracking-wide select-none px-4";
                }
            }

            // 2. 卡片反面三语结构渲染
            document.getElementById('card-def-zh').innerText = currentProverb.meaning || '暂无释义';
            document.getElementById('card-def-en').innerText = currentProverb.en || 'No translation available.';
            document.getElementById('card-def-bm').innerText = currentProverb.bm || 'Tiada terjemahan.';
            
            // 3. 例句上下文智能遮罩挖空
            const exampleBox = document.getElementById('card-example-box');
            if (exampleBox) {
                const proverbText = currentProverb.text || '';
                let exampleText = currentProverb.example || '';
                
                if (exampleText) {
                    if (proverbText && exampleText.includes(proverbText)) {
                        exampleText = exampleText.replace(proverbText, ` ______ `);
                    }
                    exampleBox.innerHTML = `
                        <div class="bg-white/80 border border-amber-950/5 p-3.5 rounded-xl shadow-sm">
                            <div class="inline-flex items-center gap-1 bg-amber-900/5 text-amber-900/70 text-[10px] font-bold tracking-wider px-1.5 py-0.5 rounded mb-1.5">
                                <span>例句语境</span>
                            </div>
                            <p class="text-stone-700 text-[12.5px] font-medium leading-relaxed pl-0.5 tracking-wide">${exampleText}</p>
                        </div>`;
                } else {
                    exampleBox.innerHTML = `
                        <div class="bg-white/60 border border-amber-950/5 p-3 rounded-xl shadow-sm text-center">
                            <p class="text-stone-400 text-[11px] tracking-wide">💡 点击卡片任意位置即可翻转查看双语对照</p>
                        </div>`;
                }
            }

            // 4. 控制底线进度数据
            const progressEl = document.getElementById('progress-indicator');
            if (progressEl) {
                progressEl.innerText = `进度：${currentIndex + 1} / ${currentPlan.length} ${isWeaknessMode ? '（错题训练中）' : ''}`;
            }
        }

        function setupFlipEvent() {
            const container = document.getElementById('card-container');
            const flipCardEl = document.getElementById('flip-card');
            if (container && flipCardEl) {
                container.onclick = null;
                container.onclick = function() {
                    isFlipped = !isFlipped;
                    flipCardEl.classList.toggle('rotate-y-180', isFlipped);
                };
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgClass = type === 'success' ? 'bg-stone-800 text-white' : 'bg-red-50 border border-red-200 text-red-800';
            toast.className = `${bgClass} px-4 py-2.5 rounded-xl shadow-lg text-xs font-semibold tracking-wide flex items-center gap-1.5 animate-bounce pointer-events-auto transition-all duration-300`;
            toast.innerHTML = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-2');
                setTimeout(() => { toast.remove(); }, 300);
            }, 2500);
        }

        function updateMasteryProgress() {
            let wrongList = JSON.parse(localStorage.getItem('yanyu_wrong_list')) || [];
            const totalWords = allProverbs.length || 150;
            const wrongCount = wrongList.length;
            const masteredCount = Math.max(0, totalWords - wrongCount);
            
            const percent = totalWords > 0 ? Math.round((masteredCount / totalWords) * 100) : 0;
            
            const bar = document.getElementById('mastery-progress-bar');
            if (bar) bar.style.width = `${percent}%`;
            
            const txt = document.getElementById('mastery-status');
            if (txt) txt.innerText = `已掌握 ${masteredCount} / ${totalWords} 词 (${percent}%)`;
        }

        function markMastery(isMastered) {
            if (currentPlan.length === 0) return;
            const currentProverb = currentPlan[currentIndex];
            let wrongList = JSON.parse(localStorage.getItem('yanyu_wrong_list')) || [];
            const currentText = currentProverb.text || '';

            if (!isMastered) {
                if (!wrongList.some(item => item.text === currentText)) { wrongList.push(currentProverb); }
                showToast("📌 已加入待加强训练库");
            } else {
                wrongList = wrongList.filter(item => item.text !== currentText);
                showToast("🎉 太棒了，这句谚语已经熟练掌握！");
            }

            localStorage.setItem('yanyu_wrong_list', JSON.stringify(wrongList));
            updateWeaknessButton(wrongList.length);
            updateMasteryProgress();
            currentIndex++;
            
            if (currentIndex >= currentPlan.length) {
                if (isWeaknessMode) {
                    showToast("👑 太棒了！本轮错题专项集训全部通关！");
                    isWeaknessMode = false;
                    filterLetter('ALL');
                    return;
                } else {
                    showToast("🌟 该字母下的谚语已全部通读完毕！");
                    currentIndex = 0; 
                }
            }
            renderCard();
        }

        function startWeaknessTraining() {
            const wrongList = JSON.parse(localStorage.getItem('yanyu_wrong_list')) || [];
            if (wrongList.length === 0) {
                showToast("✨ 极好！当前没有任何待加强的错题！");
                return;
            }
            isWeaknessMode = true;
            currentPlan = [...wrongList].sort(() => 0.5 - Math.random()); 
            currentIndex = 0;
            renderCard();
        }

        function filterLetter(letterName) {
            isWeaknessMode = false;
            activeLetter = letterName;

            const buttons = document.querySelectorAll('#filterNav button');
            buttons.forEach(btn => {
                if (btn.innerText === letterName || (letterName === 'ALL' && btn.innerText === '全部')) {
                    btn.classList.add('bg-stone-800', 'text-white', 'border-stone-800');
                    btn.classList.remove('bg-white', 'text-stone-600', 'border-stone-200');
                } else {
                    btn.classList.remove('bg-stone-800', 'text-white', 'border-stone-800');
                    if(!btn.disabled) {
                        btn.classList.add('bg-white', 'text-stone-600', 'border-stone-200');
                    }
                }
            });

            filterLetterData();
            renderCard();
        }

        function updateWeaknessButton(count) {
            const btn = document.querySelector('button[onclick="startWeaknessTraining()"]');
            if (btn) btn.innerHTML = `🎯 错题训练 (<span class="text-amber-600 font-bold">${count}</span>)`;
        }

        function showEmptyState() {
            const rubyContainer = document.getElementById('card-yanyu-ruby');
            if (rubyContainer) rubyContainer.innerHTML = `<span class="text-base text-stone-400">该字母下暂无谚语数据</span>`;
        }

        // ==========================================
        // 📝 智能三维小测验逻辑区 (Quiz System)
        // ==========================================
        function startQuiz() {
            const quizSource = currentPlan;

            if (!quizSource || quizSource.length === 0) {
                showToast("⚠️ 当前分类下暂无数据，无法开始测验！", "error");
                return;
            }
            if (allProverbs.length < 4) {
                showToast("⚠️ 全库谚语总数少于4个，无法生成选择干扰项！", "error");
                return;
            }

            document.getElementById('quiz-question-container').classList.remove('hidden');
            document.getElementById('quiz-result-container').classList.add('hidden');

            const titleText = isWeaknessMode ? "错题本挑战" : (activeLetter === 'ALL' ? '全库随机测验' : `${activeLetter} 字母专项挑战`);
            document.getElementById('quiz-title-text').innerText = `🎯 ${titleText}`;

            const shuffled = [...quizSource].sort(() => 0.5 - Math.random());
            const actualTotal = Math.min(QUIZ_TOTAL, quizSource.length);
            quizQuestions = shuffled.slice(0, actualTotal);
            
            // 混合分发 3 种独立题型模型：0=看词选意，1=看意选词，2=语境填空
            quizQuestions = quizQuestions.map(q => {
                return {
                    ...q,
                    qType: Math.floor(Math.random() * 3) 
                };
            });

            quizCurrentIndex = 0;
            quizScore = 0;

            document.getElementById('quiz-modal').classList.remove('hidden');
            renderQuizQuestion();
        }

        function closeQuiz() {
            document.getElementById('quiz-modal').classList.add('hidden');
        }

        function renderQuizQuestion() {
            const currentQ = quizQuestions[quizCurrentIndex];
            
            document.getElementById('quiz-q-num').innerText = `题目 ${quizCurrentIndex + 1} / ${quizQuestions.length}`;
            const percent = ((quizCurrentIndex) / quizQuestions.length) * 100;
            document.getElementById('quiz-progress-bar').style.width = `${percent}%`;

            const questionWordEl = document.getElementById('quiz-question-word');

            const distractors = allProverbs
                .filter(item => item.text !== currentQ.text)
                .sort(() => 0.5 - Math.random())
                .slice(0, 3);

            const options = [currentQ, ...distractors].sort(() => 0.5 - Math.random());
            const optionsContainer = document.getElementById('quiz-options');

            if (currentQ.qType === 0) {
                // 【Type 0】：看词猜意
                questionWordEl.innerHTML = `<span class="text-[10px] bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded font-sans font-medium">看词猜意</span><br><p class="mt-2 text-2xl font-serif font-bold text-stone-800">${currentQ.text}</p>`;
                
                optionsContainer.innerHTML = options.map(opt => {
                    const isCorrect = (opt.text === currentQ.text);
                    return `
                        <button onclick="handleQuizAnswer(this, ${isCorrect})" class="w-full text-left p-3 rounded-xl border-2 border-stone-100 hover:border-amber-400 hover:bg-amber-50/50 transition-all font-sans text-stone-700 text-xs sm:text-sm leading-relaxed">
                            ${opt.meaning}
                        </button>
                    `;
                }).join('');

            } else if (currentQ.qType === 1) {
                // 【Type 1】：根据释义选词
                questionWordEl.innerHTML = `<span class="text-[10px] bg-blue-100 text-blue-800 px-1.5 py-0.5 rounded font-sans font-medium block w-max mx-auto mb-2">根据释义选谚语</span><p class="text-base font-medium font-sans px-4 text-stone-700 leading-relaxed text-left">${currentQ.meaning}</p>`;
                
                optionsContainer.innerHTML = options.map(opt => {
                    const isCorrect = (opt.text === currentQ.text);
                    return `
                        <button onclick="handleQuizAnswer(this, ${isCorrect})" class="w-full text-center p-3 rounded-xl border-2 border-stone-100 hover:border-amber-400 hover:bg-amber-50/50 transition-all font-serif font-bold text-stone-800 text-sm sm:text-base">
                            ${opt.text}
                        </button>
                    `;
                }).join('');
            } else {
                // 【Type 2】：高阶语境挖空填空
                let exampleText = currentQ.example || '目前这句谚语暂无例句语境支持。';
                const proverbText = currentQ.text || '';
                if (proverbText && exampleText.includes(proverbText)) {
                    exampleText = exampleText.replace(proverbText, ` ______ `);
                }
                
                questionWordEl.innerHTML = `<span class="text-[10px] bg-emerald-100 text-emerald-800 px-1.5 py-0.5 rounded font-sans font-medium block w-max mx-auto mb-2">谚语语境填空</span><p class="text-sm font-medium font-sans px-4 text-stone-700 leading-relaxed text-left">${exampleText}</p>`;
                
                optionsContainer.innerHTML = options.map(opt => {
                    const isCorrect = (opt.text === currentQ.text);
                    return `
                        <button onclick="handleQuizAnswer(this, ${isCorrect})" class="w-full text-center p-3 rounded-xl border-2 border-stone-100 hover:border-amber-400 hover:bg-amber-50/50 transition-all font-serif font-bold text-stone-800 text-sm sm:text-base">
                            ${opt.text}
                        </button>
                    `;
                }).join('');
            }
        }

        function handleQuizAnswer(buttonEl, isCorrect) {
            const allButtons = document.getElementById('quiz-options').querySelectorAll('button');
            allButtons.forEach(btn => btn.disabled = true);

            if (isCorrect) {
                quizScore++;
                buttonEl.classList.remove('border-stone-100', 'hover:border-amber-400');
                buttonEl.classList.add('border-green-500', 'bg-green-50/60', 'text-green-800');
            } else {
                buttonEl.classList.remove('border-stone-100', 'hover:border-amber-400');
                buttonEl.classList.add('border-red-500', 'bg-red-50/60', 'text-red-800');
                
                allButtons.forEach(btn => {
                    if (btn.getAttribute('onclick').includes('true')) {
                        btn.classList.add('border-green-500', 'bg-green-50/40');
                    }
                });

                // 答错的谚语同步自动写到强化错题库
                let wrongList = JSON.parse(localStorage.getItem('yanyu_wrong_list')) || [];
                const currentQ = quizQuestions[quizCurrentIndex];
                if (!wrongList.some(item => item.text === currentQ.text)) {
                    wrongList.push(currentQ);
                    localStorage.setItem('yanyu_wrong_list', JSON.stringify(wrongList));
                    updateWeaknessButton(wrongList.length);
                    updateMasteryProgress();
                }
            }

            setTimeout(() => {
                quizCurrentIndex++;
                if (quizCurrentIndex < quizQuestions.length) {
                    renderQuizQuestion();
                } else {
                    showQuizResults();
                }
            }, 1200);
        }

        function showQuizResults() {
            document.getElementById('quiz-progress-bar').style.width = `100%`;
            document.getElementById('quiz-question-container').classList.add('hidden');
            document.getElementById('quiz-result-container').classList.remove('hidden');

            document.getElementById('quiz-score').innerText = `${quizScore} / ${quizQuestions.length}`;
            
            let evaluation = "再接再厉，多翻翻闪卡加深印象吧！";
            if (quizScore === quizQuestions.length) {
                evaluation = "👑 太厉害了！满分通关！";
            } else if (quizScore >= Math.floor(quizQuestions.length * 0.8)) {
                evaluation = "🌟 优秀！底子非常扎实！";
            } else if (quizScore >= Math.floor(quizQuestions.length * 0.6)) {
                evaluation = "👍 及格啦，答错的谚语已经自动帮你归入错题库啰！";
            }
            document.getElementById('quiz-eval').innerText = evaluation;
        }

        window.onload = function() {
            initApp();
        };
    </script>
</body>
</html>
