<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常用谚语150句互动学习舱</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5a623;
            --bg-color: #f7f9fc;
            --card-bg: #ffffff;
            --text-color: #333333;
            --sky-blue: #e3f2fd;
            --sky-blue-text: #0d47a1;
            --rose-pink: #fce4ec;
            --rose-pink-text: #880e4f;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        /* 进度条与仪表盘 */
        .dashboard {
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .progress-container {
            flex-grow: 1;
            margin: 0 20px;
            background: #eee;
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4a90e2, #66bb6a);
            transition: width 0.3s ease;
        }

        /* A-Z 动态字母导航栏 */
        .alphabet-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .letter-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #ddd;
            background: var(--card-bg);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .letter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .letter-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 模式切换按钮 */
        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .mode-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            background: #e0e0e0;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--secondary-color);
            color: white;
        }

        /* 谚语卡片网格布局 */
        .proverbs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* 翻转卡片核心样式 */
        .card-container {
            perspective: 1000px;
            height: 220px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            box-sizing: border-box;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--card-bg);
        }

        .card-back {
            transform: rotateY(180deg);
            overflow-y: auto;
        }

        /* 拼音字号自适应与标点下沉 */
        .proverb-text-box {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            line-height: 2.2;
            width: 100%;
        }

        .char-unit {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin: 0 2px;
        }

        .char-pinyin {
            font-size: 12px;
            color: #777;
            height: 16px;
            line-height: 16px;
        }

        .char-hanzi {
            font-size: 20px;
            font-weight: bold;
        }

        /* 标点符号只显示汉字，不悬浮拼音，完美下沉 */
        .char-unit.punctuation .char-pinyin {
            visibility: hidden;
        }
        .char-unit.punctuation .char-hanzi {
            font-size: 20px;
            font-weight: bold;
            vertical-align: bottom;
        }

        /* 翻译区块配色优化 (Sky Blue & Rose Pink) */
        .translation-block {
            width: 100%;
            margin: 4px 0;
            padding: 6px;
            border-radius: 6px;
            font-size: 13px;
            text-align: left;
        }

        .trans-en {
            background-color: var(--sky-blue);
            color: var(--sky-blue-text);
            border-left: 4px solid var(--primary-color);
        }

        .trans-bm {
            background-color: var(--rose-pink);
            color: var(--rose-pink-text);
            border-left: 4px solid #e91e63;
        }

        .meaning-text {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
        }

        /* 收藏/掌握度按钮 */
        .mastery-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            display: none;
        }

        .card-container.mastered .mastery-badge {
            display: block;
        }

        .action-bar {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            z-index: 10;
        }

        .action-btn {
            padding: 4px 10px;
            font-size: 11px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Quiz 模块样式 */
        .quiz-panel {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            max-width: 600px;
            margin: 0 auto;
            display: none;
        }

        .quiz-question {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            padding: 12px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: #f0f7ff;
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>常用谚语 150 句互动学习舱</h1>
        <p>SMK / 独中 华文复习备考必备利器</p>
    </header>

    <!-- 顶层仪表盘 -->
    <div class="dashboard">
        <span id="progress-text">已掌握: 0 / 150</span>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <button onclick="resetMastery()" style="padding:5px 10px; cursor:pointer;">重置进度</button>
    </div>

    <!-- 模式切换 -->
    <div class="mode-switch">
        <button class="mode-btn active" id="btn-learn" onclick="switchMode('learn')">浏览模式</button>
        <button class="mode-btn" id="btn-quiz" onclick="switchMode('quiz')">智能小测验 (Quiz)</button>
    </div>

    <!-- 学习浏览视图 -->
    <div id="view-learn">
        <!-- 动态字母检索 -->
        <div class="alphabet-nav" id="alphabet-nav"></div>
        <!-- 卡片容器 -->
        <div class="proverbs-grid" id="proverbs-grid"></div>
    </div>

    <!-- Quiz 测试视图 -->
    <div id="view-quiz" class="quiz-panel">
        <div id="quiz-content"></div>
    </div>
</div>

<!-- 💡 按顺序动态引入 6 个独立的数据文件，避免单一文件过于庞大 -->
<script src="data-proverb-1.js"></script>
<script src="data-proverb-2.js"></script>
<script src="data-proverb-3.js"></script>
<script src="data-proverb-4.js"></script>
<script src="data-proverb-5.js"></script>
<script src="data-proverb-6.js"></script>

<script>
    // 聚合 6 个 js 文件的全量数据
    let allProverbs = [];
    let masteredIds = JSON.parse(localStorage.getItem('mastered_proverbs') || '[]');
    let currentLetter = 'ALL';

    window.onload = function() {
        // 合并各数组变量
        if(typeof pData1 !== 'undefined') allProverbs = allProverbs.concat(pData1);
        if(typeof pData2 !== 'undefined') allProverbs = allProverbs.concat(pData2);
        if(typeof pData3 !== 'undefined') allProverbs = allProverbs.concat(pData3);
        if(typeof pData4 !== 'undefined') allProverbs = allProverbs.concat(pData4);
        if(typeof pData5 !== 'undefined') allProverbs = allProverbs.concat(pData5);
        if(typeof pData6 !== 'undefined') allProverbs = allProverbs.concat(pData6);

        buildAlphabetNav();
        updateDashboard();
        renderCards();
    };

    // 智能提取拼音首字母进行 A-Z 不均衡适配
    function buildAlphabetNav() {
        const letters = new Set();
        allProverbs.forEach(p => {
            if(p.pinyin_key) {
                letters.add(p.pinyin_key.charAt(0).toUpperCase());
            }
        });
        const sortedLetters = Array.from(letters).sort();
        
        const nav = document.getElementById('alphabet-nav');
        let html = `<button class="letter-btn ${currentLetter==='ALL'?'active':''}" onclick="filterLetter('ALL')">全</button>`;
        
        // 生成有数据的字母按钮
        ['A','B','C','D','E','F','G','H','J','K','L','M','N','P','Q','R','S','T','W','X','Y','Z'].forEach(l => {
            if(sortedLetters.includes(l)) {
                html += `<button class="letter-btn ${currentLetter===l?'active':''}" onclick="filterLetter('${l}')">${l}</button>`;
            } else {
                html += `<button class="letter-btn" disabled>${l}</button>`;
            }
        });
        nav.innerHTML = html;
    }

    function filterLetter(letter) {
        currentLetter = letter;
        buildAlphabetNav();
        renderCards();
    }

    // 拼音汉字完美对齐渲染引擎（自动让逗号句号等标点下沉）
    function createPinyinHtml(text, pinyinStr) {
        const words = text.split('');
        const pinyins = pinyinStr.split(' ');
        let html = '';
        let pyIndex = 0;

        const puncts = ['，', '。', '；', '：', '？', '！', ',', '.', ' ', '、'];

        for(let i=0; i<words.length; i++) {
            const char = words[i];
            if(puncts.includes(char)) {
                html += `<div class="char-unit punctuation"><div class="char-pinyin"></div><div class="char-hanzi">${char}</div></div>`;
            } else {
                const py = pinyins[pyIndex] || '';
                html += `<div class="char-unit"><div class="char-pinyin">${py}</div><div class="char-hanzi">${char}</div></div>`;
                pyIndex++;
            }
        }
        return html;
    }

    // 渲染卡片
    function renderCards() {
        const grid = document.getElementById('proverbs-grid');
        grid.innerHTML = '';

        const filtered = allProverbs.filter(p => {
            if(currentLetter === 'ALL') return true;
            return p.pinyin_key && p.pinyin_key.charAt(0).toUpperCase() === currentLetter;
        });

        filtered.forEach(p => {
            const isMastered = masteredIds.includes(p.id);
            const cardBox = document.createElement('div');
            cardBox.className = `card-container ${isMastered?'mastered':''}`;
            cardBox.id = `card-box-${p.id}`;
            
            // 自适应字号处理
            let fontSizeClass = '';
            if(p.text.length > 12) fontSizeClass = 'style="transform: scale(0.9); transform-origin: center;"';

            cardBox.innerHTML = `
                <div class="card-inner" onclick="toggleFlip(this)">
                    <div class="card-front">
                        <span class="mastery-badge">已掌握</span>
                        <div class="proverb-text-box" ${fontSizeClass}>
                            ${createPinyinHtml(p.text, p.pinyin)}
                        </div>
                        <div class="action-bar">
                            <button class="action-btn" onclick="toggleMastery(${p.id}, event)">
                                ${isMastered?'取消掌握':'标记掌握'}
                            </button>
                        </div>
                    </div>
                    <div class="card-back">
                        <div class="meaning-text">${p.meaning}</div>
                        <div class="translation-block trans-en"><strong>EN:</strong> ${p.en}</div>
                        <div class="translation-block trans-bm"><strong>BM:</strong> ${p.bm}</div>
                    </div>
                </div>
            `;
            grid.appendChild(cardBox);
        });
    }

    function toggleFlip(el) {
        // 如果点击的是按钮，不触发翻转
        if(event.target.tagName === 'BUTTON') return;
        el.parentElement.classList.toggle('flipped');
    }

    function toggleMastery(id, event) {
        event.stopPropagation();
        const idx = masteredIds.indexOf(id);
        if(idx > -1) {
            masteredIds.splice(idx, 1);
        } else {
            masteredIds.push(id);
        }
        localStorage.setItem('mastered_proverbs', JSON.stringify(masteredIds));
        updateDashboard();
        renderCards();
    }

    function updateDashboard() {
        document.getElementById('progress-text').innerText = `已掌握: ${masteredIds.length} / ${allProverbs.length || 150}`;
        const pct = (masteredIds.length / (allProverbs.length || 150)) * 100;
        document.getElementById('progress-bar').style.width = pct + '%';
    }

    function resetMastery() {
        if(confirm('确定要清空所有掌握进度吗？')) {
            masteredIds = [];
            localStorage.setItem('mastered_proverbs', JSON.stringify([]));
            updateDashboard();
            renderCards();
        }
    }

    function switchMode(mode) {
        document.getElementById('btn-learn').classList.toggle('active', mode==='learn');
        document.getElementById('btn-quiz').classList.toggle('active', mode==='quiz');
        
        document.getElementById('view-learn').style.display = mode==='learn'?'block':'none';
        document.getElementById('view-quiz').style.display = mode==='quiz'?'block':'none';

        if(mode === 'quiz') startQuiz();
    }

    // 智能 Quiz 出题引擎
    let currentQuizIndex = 0;
    let quizData = [];
    
    function startQuiz() {
        if(allProverbs.length === 0) return;
        // 随机抽 10 题进行测试
        let shuffled = [...allProverbs].sort(() => 0.5 - Math.random());
        quizData = shuffled.slice(0, 10);
        currentQuizIndex = 0;
        showQuizQuestion();
    }

    function showQuizQuestion() {
        const panel = document.getElementById('quiz-content');
        if(currentQuizIndex >= quizData.length) {
            panel.innerHTML = `<h3>🎉 测验完成！</h3><p>你答对了全部测试题，继续保持！</p><button class="mode-btn active" onclick="startQuiz()">再来一组</button>`;
            return;
        }

        const q = quizData[currentQuizIndex];
        // 随机生成混淆选项
        let options = [q.meaning];
        while(options.length < 4) {
            let rand = allProverbs[Math.floor(Math.random()*allProverbs.length)].meaning;
            if(!options.includes(rand)) options.push(rand);
        }
        options.sort(() => 0.5 - Math.random());

        let optionsHtml = options.map(opt => `<button class="option-btn" onclick="checkAnswer('${opt.replace(/'/g, "\\'")}', '${q.meaning.replace(/'/g, "\\'")}')">${opt}</button>`).join('');

        panel.innerHTML = `
            <div style="margin-bottom: 10px; color: #666;">第 ${currentQuizIndex+1} / 10 题</div>
            <div class="quiz-question">请问谚语：“<strong>${q.text}</strong>” 的意思是？</div>
            <div class="quiz-options">${optionsHtml}</div>
        `;
    }

    function checkAnswer(selected, correct) {
        if(selected === correct) {
            alert('答对了！✨');
            currentQuizIndex++;
            showQuizQuestion();
        } else {
            alert(`答错了，再试一次！❌`);
        }
    }
</script>
</body>
</html>
